name: Run an npm script
description: 'Run an npm script'
inputs:
  script:
    description: 'The npm script to run'
    required: true
  deployment_key:
    description: 'The private key to use for deployment'
    required: true


runs:
  using: 'composite'
  steps:

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: '.tool-versions'
        cache: 'npm'

    - uses: guardian/actions-read-private-repos@48bc5aeef8584a03a3a89ec82f9a7d06c7736855 # v1.0.0
      with:
        private-ssh-keys: ${{ env.KEY }}
      env:
        KEY: ${{ inputs.deployment_key }}

    - name: install dependencies
      shell: bash
      run: npm ci

    - name: Run script
      shell: bash
      run: npm run "${SCRIPT}"
      env:
        SCRIPT: ${{ inputs.script }}
