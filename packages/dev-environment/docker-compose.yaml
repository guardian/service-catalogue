services:
  postgres:
    image: postgres:18.3
    ports:
      - '${DATABASE_PORT}:${DATABASE_PORT}'
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready --host 127.0.0.1']
      interval: 10s
      timeout: 5s
      retries: 5

  prisma-seed:
    image: node:24.16-trixie
    # Runs as root to avoid permission issues with named volumes in local dev
    user: "0:0"
    working_dir: /workspace/packages/common
    volumes:
      - ../../:/workspace
      - prisma_seed_root_node_modules:/workspace/node_modules
      - prisma_seed_common_node_modules:/workspace/packages/common/node_modules
    environment:
      DATABASE_HOSTNAME: postgres
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:${DATABASE_PORT}/${DATABASE_NAME}?sslmode=disable
      STAGE: DEV
    depends_on:
      postgres:
        condition: service_healthy
    command: /workspace/packages/dev-environment/script/prisma-seed

  cloudquery:
    build:
      context: ../../containers/cloudquery
      args:
        CQ_CLI: ${CQ_CLI}
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ~/.aws/credentials:/.aws/credentials
      - ./config/cloudquery.yaml:/cloudquery.yaml
      - ~/.gu/service_catalogue/app-id:/app-id
      - ~/.gu/service_catalogue/installation-id:/installation-id
      - ~/.gu/service_catalogue/private-key.pem:/private-key.pem
    environment:
      AWS_SHARED_CREDENTIALS_FILE: '/.aws/credentials'
      CQ_POSTGRES_DESTINATION: ${CQ_POSTGRES_DESTINATION}
      CQ_AWS: ${CQ_AWS}
      CQ_GITHUB: ${CQ_GITHUB}
      GITHUB_ACCESS_TOKEN: ${GITHUB_ACCESS_TOKEN}
      GALAXIES_BUCKET: ${GALAXIES_BUCKET:-}
      CLOUDQUERY_API_KEY: ${CLOUDQUERY_API_KEY}
      DATABASE_URL: ${CQ_DATABASE_URL}
    command: sync /cloudquery.yaml --log-console --log-level info

  grafana:
    image: grafana/grafana-oss:10.3.1
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - ./config/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    environment:
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.theguardian-servicecatalogue-app:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: theguardian-servicecatalogue-app

volumes:
  prisma_seed_root_node_modules:
  prisma_seed_common_node_modules: